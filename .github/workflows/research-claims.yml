name: Research Claim Validation

on:
  pull_request:
    paths:
      - "research/sd-prompt-research/concepts/**"
      - "research/sd-prompt-research/knowledge/**"
      - "research/sd-prompt-research/schemas/**"
      - "research/sd-prompt-research/templates/**"
      - "research/sd-prompt-research/scripts/build_concept_graph.py"
      - "research/sd-prompt-research/scripts/validate_research_claims.py"
      - "research/sd-prompt-research/scripts/claim_draft_pipeline.py"
      - "research/sd-prompt-research/scripts/observation_to_claim.py"
      - "research/sd-prompt-research/tests/**"
      - "research/sd-prompt-research/requirements.txt"
      - ".github/workflows/research-claims.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      CLAIM_VALIDATION_BASELINE_SHA: ${{ github.event.pull_request.base.sha }}
    steps:
      - name: Check out pull request
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: research/sd-prompt-research/requirements.txt

      - name: Install research dependencies
        run: python -m pip install -r research/sd-prompt-research/requirements.txt

      - name: Run research tests
        working-directory: research/sd-prompt-research
        run: python -m unittest discover -s tests -v

      - name: Validate Concept Graph sources
        working-directory: research/sd-prompt-research
        run: python scripts/build_concept_graph.py --check

      - name: Validate Research Claim staging layer
        working-directory: research/sd-prompt-research
        run: >-
          python scripts/validate_research_claims.py
          --baseline-ref "$CLAIM_VALIDATION_BASELINE_SHA"
          --validation-context current_state
          --format json
